updates:
- directory: /
  ignore:
  - dependency-name: "github/gh-aw-actions/**" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  package-ecosystem: github-actions
  schedule:
    interval: monthly
    time: "09:00"
    timezone: Europe/Brussels
- directory: /
  package-ecosystem: npm
  schedule:
    interval: monthly
    time: "09:00"
    timezone: Europe/Brussels
version: 2
